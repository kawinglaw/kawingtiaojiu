<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍹 今天喝什么 - 你的名字，你的鸡尾酒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        :root {
            --tw-color-primary: #c026d3;
        }
        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
        }
        .title-font {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
        }
        .glass {
            animation: pour 3s infinite ease-in-out;
        }
        @keyframes pour {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(8deg); }
        }
        .result-card {
            box-shadow: 0 25px 50px -12px rgb(192 38 211);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-950 via-violet-900 to-fuchsia-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <!-- 头部 -->
        <div class="text-center py-8">
            <div class="inline-flex items-center gap-3 bg-white/10 backdrop-blur-md px-8 py-3 rounded-3xl border border-white/20 mb-6">
                <span class="text-4xl">🍹</span>
                <h1 class="title-font text-4xl font-bold tracking-tight">AI 专属调酒师</h1>
            </div>
            <p class="text-xl text-purple-200">输入你的名字 + 今天心情 + 喜欢的风味</p>
            <p class="text-purple-300 mt-2">AI 瞬间为你随机调一杯专属鸡尾酒！</p>
        </div>

        <!-- 表单页面 -->
        <div id="form-page" class="bg-white/10 backdrop-blur-2xl rounded-3xl p-8 border border-white/20">
            <!-- 名字 -->
            <div class="mb-8">
                <label class="block text-sm font-medium text-purple-200 mb-3 flex items-center gap-2">
                    <span>✍️</span> 你的名字
                </label>
                <input 
                    id="user-name"
                    type="text" 
                    placeholder="输入你的名字（比如：小明）"
                    class="w-full bg-white/10 border border-white/30 focus:border-purple-400 rounded-2xl px-6 py-4 text-lg outline-none transition-all placeholder:text-purple-300">
            </div>

            <!-- 今天心情 -->
            <div class="mb-8">
                <label class="block text-sm font-medium text-purple-200 mb-3 flex items-center gap-2">
                    <span>🌈</span> 今天的心情
                </label>
                <div id="mood-options" class="grid grid-cols-4 gap-4">
                    <!-- JS 动态生成 -->
                </div>
            </div>

            <!-- 喜欢的风味 -->
            <div class="mb-10">
                <label class="block text-sm font-medium text-purple-200 mb-3 flex items-center gap-2">
                    <span>🍋</span> 喜欢的风味（可多选）
                </label>
                <div id="flavor-options" class="grid grid-cols-4 gap-4">
                    <!-- JS 动态生成 -->
                </div>
            </div>

            <!-- 生成按钮 -->
            <button onclick="generateCocktail()"
                    class="w-full bg-gradient-to-r from-pink-500 to-violet-500 hover:from-pink-600 hover:to-violet-600 text-white font-medium text-xl py-6 rounded-3xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl">
                <span class="text-3xl">🍸</span>
                <span>AI 帮我调一杯！</span>
            </button>
            <p class="text-center text-xs text-purple-400 mt-6">单文件 H5 • 无需服务器 • 随时分享链接</p>
        </div>

        <!-- 结果页面（默认隐藏） -->
        <div id="result-page" class="hidden">
            <div class="result-card bg-white/10 backdrop-blur-2xl rounded-3xl p-8 border border-white/20">
                <!-- 返回按钮 -->
                <button onclick="restart()" 
                        class="flex items-center gap-2 text-purple-300 hover:text-white mb-6 transition-colors">
                    <span class="text-2xl leading-none">←</span>
                    <span class="font-medium">重新调一杯</span>
                </button>
                <div class="flex flex-col items-center text-center">
                    <!-- 杯子动画 -->
                    <div class="glass text-8xl mb-6">🍹</div>
                    <!-- 鸡尾酒名称 -->
                    <h2 id="cocktail-name" class="title-font text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-300 to-violet-300 mb-2"></h2>
                    <p id="personal-greeting" class="text-purple-200 text-lg mb-8"></p>
                    <!-- AI 文案 -->
                    <div id="ai-description" class="bg-white/5 rounded-2xl p-6 text-left mb-8 text-purple-100 leading-relaxed"></div>
                    <!-- 配方详情 -->
                    <div class="w-full bg-white/5 rounded-2xl p-6 mb-8">
                        <h3 class="font-semibold text-xl mb-5 flex items-center gap-2">
                            <span>📋</span> 调酒配方
                        </h3>
                        <div class="space-y-6">
                            <!-- 基酒 -->
                            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                                <div class="flex items-center gap-4">
                                    <div class="text-3xl">🥃</div>
                                    <div>
                                        <p id="base-spirit" class="font-medium text-xl"></p>
                                        <p class="text-purple-300 text-sm">基酒</p>
                                    </div>
                                </div>
                                <div id="base-amount" class="text-right font-mono text-4xl font-semibold text-pink-300"></div>
                            </div>
                            <!-- 其他配料 -->
                            <div id="ingredients-list" class="space-y-4">
                                <!-- JS 动态插入 -->
                            </div>
                        </div>
                    </div>
                    <!-- 调制步骤 -->
                    <div class="w-full bg-white/5 rounded-2xl p-6 mb-8">
                        <h3 class="font-semibold text-xl mb-5 flex items-center gap-2">
                            <span>🔥</span> 调制步骤
                        </h3>
                        <ol id="steps-list" class="list-decimal pl-5 space-y-3 text-purple-100">
                            <!-- JS 动态插入 -->
                        </ol>
                    </div>
                    <!-- 分享提示 -->
                    <div class="flex gap-4 w-full">
                        <button onclick="copyLink()" 
                                class="flex-1 py-4 bg-white/10 hover:bg-white/20 rounded-2xl font-medium flex items-center justify-center gap-2 transition-all">
                            🔗 复制这个 H5 链接分享给朋友
                        </button>
                        <button onclick="restart()" 
                                class="flex-1 py-4 bg-gradient-to-r from-pink-500 to-violet-500 rounded-2xl font-medium flex items-center justify-center gap-2 transition-all">
                            🍹 再来一杯
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

                baseSpirit: "波本威士忌",
                baseAmount: 50,

                ],

                ],

                moods: ["疲惫", "放松"],

            }
        ]

        // 渲染心情选项
        function renderMoods() {
            const container = document.getElementById('mood-options')
            container.innerHTML = moods.map(mood => `
                <div onclick="selectMood(this)" 
                     data-value="${mood.value}"
                     class="mood-item flex flex-col items-center justify-center bg-white/10 hover:bg-white/20 rounded-2xl p-4 cursor-pointer border-2 border-transparent transition-all">
                    <span class="text-4xl mb-2">${mood.emoji}</span>
                    <span class="font-medium">${mood.label}</span>
                </div>
            `).join('')
        }

        // 渲染风味选项
        function renderFlavors() {
            const container = document.getElementById('flavor-options')
            container.innerHTML = flavors.map(flavor => `
                <div onclick="toggleFlavor(this)" 
                     data-value="${flavor.value}"
                     class="flavor-item flex flex-col items-center justify-center bg-white/10 hover:bg-white/20 rounded-2xl p-4 cursor-pointer border-2 border-transparent transition-all">
                    <span class="text-4xl mb-2">${flavor.emoji}</span>
                    <span class="font-medium">${flavor.label}</span>
                </div>
            `).join('')
        }

        let selectedMood = null
        let selectedFlavors = []

        window.selectMood = function(el) {
            // 清除所有选中
            document.querySelectorAll('.mood-item').forEach(item => {
                item.classList.remove('border-pink-400', 'bg-pink-400/20')
            })
            // 选中当前
            el.classList.add('border-pink-400', 'bg-pink-400/20')
            selectedMood = el.dataset.value
        }

        window.toggleFlavor = function(el) {
            const value = el.dataset.value
            if (selectedFlavors.includes(value)) {
                // 取消选中
                selectedFlavors = selectedFlavors.filter(v => v !== value)
                el.classList.remove('border-pink-400', 'bg-pink-400/20')
            } else {
                // 选中
                selectedFlavors.push(value)
                el.classList.add('border-pink-400', 'bg-pink-400/20')
            }
        }

        // 生成鸡尾酒主函数
        window.generateCocktail = function() {
            const nameInput = document.getElementById('user-name').value.trim()
            const userName = nameInput || "神秘酒客"
            if (!selectedMood) {
                alert("请选择今天的心情哦～")
                return
            }
            if (selectedFlavors.length === 0) {
                alert("至少选一种你喜欢的风味吧！")
                return
            }
            // 显示加载动画
            const formPage = document.getElementById('form-page')
            formPage.style.opacity = '0.3'
            formPage.style.pointerEvents = 'none'
            // 模拟 AI 思考 1.2 秒
            setTimeout(() => {
                // 筛选匹配的鸡尾酒
                let candidates = cocktailsDB.filter(cocktail => {
                    const moodMatch = cocktail.moods.includes(selectedMood)
                    const flavorMatch = selectedFlavors.some(f => cocktail.flavors.includes(f))
                    return moodMatch || flavorMatch
                })
                // 如果没有强匹配，就随机选一个
                if (candidates.length === 0) {
                    candidates = [...cocktailsDB]
                }
                // 随机挑选（实现"AI 随机生成"效果）
                const selected = candidates[Math.floor(Math.random() * candidates.length)]
                // 渲染结果
                renderResult(userName, selectedMood, selectedFlavors, selected)
                // 切换页面
                formPage.classList.add('hidden')
                document.getElementById('result-page').classList.remove('hidden')
                formPage.style.opacity = '1'
                formPage.style.pointerEvents = 'auto'
            }, 1200)
        }

        // 渲染结果页面
        function renderResult(userName, mood, flavors, cocktail) {
            // 标题
            document.getElementById('cocktail-name').textContent = `${userName}的${cocktail.name}`
            // 问候语
            const greetingEl = document.getElementById('personal-greeting')
            greetingEl.innerHTML = `
                <span class="text-2xl">🎉</span> 
                基于你「${mood}」的心情和「${flavors.join('、')}」风味，AI 为你定制了这杯
            `
            // AI 描述文案
            const descEl = document.getElementById('ai-description')
            descEl.innerHTML = `
                <div class="italic text-lg leading-relaxed">
                    "${cocktail.desc}"<br><br>
                    这杯酒的基酒与配料完美契合你的选择，喝一口就能感受到 AI 为你量身打造的惊喜！
                </div>
            `
            // 基酒
            document.getElementById('base-spirit').innerHTML = `
                ${cocktail.baseSpirit}
                <span class="text-purple-300 text-sm font-normal ml-2">（经典基酒）</span>
            `
            document.getElementById('base-amount').innerHTML = `${cocktail.baseAmount}<span class="text-2xl ml-1">ml</span>`
            // 配料列表
            const ingredientsHTML = cocktail.ingredients.map(ing => `
                <div class="flex justify-between items-center">
                    <span class="text-purple-100">${ing.name}</span>
                    <span class="font-mono text-xl font-semibold text-violet-300">${ing.amount}</span>
                </div>
            `).join('')
            document.getElementById('ingredients-list').innerHTML = ingredientsHTML
            // 步骤
            const stepsHTML = cocktail.steps.map((step, i) => `
                <li class="flex gap-3">
                    <span class="font-mono text-pink-400 font-bold">${i+1}</span>
                    <span>${step}</span>
                </li>
            `).join('')
            document.getElementById('steps-list').innerHTML = stepsHTML
        }

        // 重置页面
        window.restart = function() {
            // 清空选择
            selectedMood = null
            selectedFlavors = []
            // 重置 UI
            document.querySelectorAll('.mood-item').forEach(el => el.classList.remove('border-pink-400', 'bg-pink-400/20'))
            document.querySelectorAll('.flavor-item').forEach(el => el.classList.remove('border-pink-400', 'bg-pink-400/20'))
            // 切换回表单
            document.getElementById('result-page').classList.add('hidden')
            document.getElementById('form-page').classList.remove('hidden')
        }

        // 复制 H5 链接（当前页面）
        window.copyLink = function() {
            const link = window.location.href
            navigator.clipboard.writeText(link).then(() => {
                const btn = event.target
                const originalText = btn.innerHTML
                btn.innerHTML = '✅ 已复制！可直接分享'
                setTimeout(() => {
                    btn.innerHTML = originalText
                }, 2000)
            })
        }

        // 初始化
        window.onload = function() {
            initTailwind()
            renderMoods()
            renderFlavors()
            console.log('%c🎉 H5 鸡尾酒生成器已就绪！你可以直接把这个 HTML 文件保存为 index.html 并分享链接', 'color:#c026d3; font-size:13px')
        }
    </script>
</body>
</html>
